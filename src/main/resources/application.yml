spring:
  application:
    name: ranger-survivor

  datasource:
    url: jdbc:h2:mem:rangersurvivor;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}
  # Empty by default (root, e.g. on Render). Set APP_BASE_PATH=/ranger to serve under
  # a subpath behind the Tailscale Funnel path mapping.
  servlet:
    context-path: ${APP_BASE_PATH:}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false
