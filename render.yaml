services:
  - type: web
    name: ranger-survivor
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/scores/top?limit=1
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
